<!DOCTYPE html>
<html>
<head>
<title>GOLD Cassino</title>
<style>
body {
    background: black;
    color: gold;
    font-family: Arial;
    text-align: center;
}
button {
    background: gold;
    color: black;
    border: none;
    padding: 15px 25px;
    font-size: 20px;
}
</style>
</head>
<body>

<h1>GOLD Cassino</h1>

<p>Saldo: R$ <span id="saldo">100</span></p>

<button onclick="apostar()">Apostar R$10</button>

<p id="resultado"></p>

<script>
let saldo = 100;

function apostar() {

    if(saldo < 10){
        document.getElementById("resultado").innerText = "Sem saldo";
        return;
    }

    saldo -= 10;

    if(Math.random() < 0.5){
        saldo += 20;
        document.getElementById("resultado").innerText = "GANHOU!";
    }else{
        document.getElementById("resultado").innerText = "PERDEU!";
    }

    document.getElementById("saldo").innerText = saldo;
}
</script>

</body>
</html>
